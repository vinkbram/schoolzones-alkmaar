<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles (accidents) -->
  <circle cx="150" cy="480" r="18" fill="#E57373" opacity="0.4"/>
  <circle cx="200" cy="520" r="12" fill="#D32F2F" opacity="0.5"/>
  <circle cx="280" cy="460" r="8" fill="#E57373" opacity="0.3"/>
  <circle cx="900" cy="150" r="14" fill="#D32F2F" opacity="0.4"/>
  <circle cx="980" cy="200" r="10" fill="#E57373" opacity="0.3"/>
  <circle cx="1050" cy="120" r="20" fill="#B71C1C" opacity="0.4"/>
  <circle cx="1100" cy="180" r="8" fill="#E57373" opacity="0.35"/>
  <circle cx="350" cy="530" r="6" fill="#D32F2F" opacity="0.3"/>
  <circle cx="820" cy="100" r="12" fill="#E57373" opacity="0.25"/>
  <circle cx="750" cy="520" r="16" fill="#D32F2F" opacity="0.3"/>
  <circle cx="680" cy="560" r="10" fill="#B71C1C" opacity="0.35"/>

  <!-- Zone shape (abstract) -->
  <ellipse cx="600" cy="315" rx="320" ry="180" fill="#F57C00" opacity="0.08" stroke="#F57C00" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="8 4"/>

  <!-- Main title -->
  <text x="600" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">SCHOOLZONES</text>
  <text x="600" y="270" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">ALKMAAR</text>

  <!-- Divider -->
  <rect x="480" y="295" width="240" height="4" rx="2" fill="#D32F2F"/>

  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="28" fill="#E57373" font-weight="600">Veilige schoolwegen, nu.</text>

  <!-- Stats -->
  <text x="340" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="48" font-weight="800" fill="#D32F2F">2.524</text>
  <text x="340" y="475" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="18" fill="#AAAAAA">ongelukken</text>

  <text x="600" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="48" font-weight="800" fill="#F57C00">33</text>
  <text x="600" y="475" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="18" fill="#AAAAAA">scholen</text>

  <text x="860" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF">30</text>
  <text x="860" y="475" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="18" fill="#AAAAAA">km/u nodig</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#D32F2F"/>
  <text x="600" y="617" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">schoolzones-alkmaar.netlify.app</text>
</svg>
