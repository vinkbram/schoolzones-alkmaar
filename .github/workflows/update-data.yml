name: Update accident data

on:
  schedule:
    # 05:00 UTC = 06:00 CET
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch accident data
        run: node scripts/fetch-accidents.js

      - name: Filter accidents to school areas
        run: node scripts/filter-accidents.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/accidents.geojson data/accidents-filtered.geojson && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/accidents.geojson data/accidents-filtered.geojson
          git commit -m "chore(data): update accident data [skip ci]"
          git push
